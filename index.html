                        <text x="20" y="25" class="text-[10px]">震源車</text>
                        <text x="160" y="25" class="text-[10px]">接收器</text>
                        <text x="100" y="90" class="text-[10px] font-bold fill-slate-800">石油儲藏層</text>
                    </svg>
                `
            }
        ];

        let openId = 1;
        const container = document.getElementById('accordion-container');

        function render() {
            container.innerHTML = topics.map(topic => {
                const isOpen = openId === topic.id;
                
                return `
                <div class="bg-white rounded-xl shadow-sm border transition-all duration-300 overflow-hidden ${
                    isOpen ? 'border-blue-300 shadow-md ring-1 ring-blue-100' : 'border-gray-200 hover:border-blue-200'
                }">
                    <button onclick="toggleCard(${topic.id})" class="w-full px-6 py-4 flex items-center justify-between focus:outline-none text-left">
                        <div class="flex items-center gap-4">
                            <div class="p-2 bg-gray-50 rounded-lg">
                                <i data-lucide="${topic.icon}" class="w-6 h-6 ${topic.color}"></i>
                            </div>
                            <h2 class="text-lg font-bold text-gray-800">${topic.title}</h2>
                        </div>
                        <i data-lucide="${isOpen ? 'chevron-up' : 'chevron-down'}" class="w-5 h-5 text-gray-400"></i>
                    </button>

                    <div class="transition-all duration-500 ease-in-out ${
                        isOpen ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'
                    }">
                        <div class="px-6 pb-6 pt-2 border-t border-gray-100">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                
                                <div class="space-y-4">
                                    <div>
                                        <h3 class="text-sm font-semibold text-blue-600 uppercase tracking-wider mb-2">科學原理解析</h3>
                                        <p class="text-gray-700 leading-relaxed text-sm whitespace-pre-line">${topic.content}</p>
                                    </div>
                                    
                                    <div class="bg-amber-50 rounded-lg p-4 border border-amber-100 relative mt-6">
                                        <span class="absolute -top-3 left-4 bg-amber-400 text-white text-xs font-bold px-2 py-1 rounded">大師舉例 💡</span>
                                        <p class="text-amber-900 mt-2 text-sm leading-relaxed">${topic.analogy}</p>
                                    </div>
                                </div>

                                <div class="flex flex-col justify-center items-center">
                                    <h3 class="text-sm font-semibold text-gray-500 mb-3 w-full text-left">動態圖解</h3>
                                    ${topic.svg}
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            // 重新初始化 Lucide Icons
            lucide.createIcons();
        }

        // 切換展開/收合狀態
        window.toggleCard = function(id) {
            openId = openId === id ? null : id;
            render();
        };

        // 初始渲染
        render();
    </script>
</body>
</html>
